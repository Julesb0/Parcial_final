{% extends 'base.html' %}

{% block title %}Eliminar proyecto{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-sm border-0">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Confirmar eliminación</h4>
            </div>

            <div class="card-body">
                <p>
                    ¿Está seguro de que desea eliminar el proyecto
                    <strong>{{ object.titulo }}</strong>?
                </p>

                <form method="post">
                    {% csrf_token %}

                    <button type="submit" class="btn btn-danger">
                        Sí, eliminar
                    </button>

                    <a href="{% url 'proyectos_julio_william_diego_mike:proyecto_detail' object.pk %}" class="btn btn-secondary">
                        Cancelar
                    </a>
                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
