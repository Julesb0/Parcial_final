{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Formulario de proyecto{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-8">

        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    {% if object %}
                        Editar proyecto académico
                    {% else %}
                        Registrar nuevo proyecto académico
                    {% endif %}
                </h4>
            </div>

            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}

                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">
                            Guardar proyecto
                        </button>

                        <a href="{% url 'proyectos_julio_william_diego_mike:proyecto_list' %}" class="btn btn-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
